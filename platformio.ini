; Feather M0 RFM96 LoRa APRS Tracker — Rocket Telemetry System
; Hybrid APRS + dense telemetry protocol over LoRa SF8
; Receives $PYRO NMEA from altimeter on SERCOM1 at 115200 baud

[env:feather_tracker]
platform = atmelsam
board = adafruit_feather_m0
framework = arduino
monitor_speed = 115200
lib_deps =
    mikalhart/TinyGPSPlus@^1.1
    jgromes/RadioLib@^7.0
    bblanchon/ArduinoJson@^6.21
    cmaglie/FlashStorage@^1.0
build_flags =
    -DFEATHER_TRACKER
    -DRADIOLIB_SPI_PARANOID=0
upload_protocol = sam-ba
upload_port = /dev/cu.usbmodem1301
monitor_port = /dev/cu.usbmodem1301
