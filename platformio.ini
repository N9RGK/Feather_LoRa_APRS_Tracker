; Feather M0 RFM96 LoRa APRS Tracker — Rocket Telemetry System
; Based on CA2RXU LoRa_APRS_Tracker architecture

[env:feather_tracker]
platform = atmelsam
board = adafruit_feather_m0
framework = arduino
monitor_speed = 115200
lib_deps =
    mikalhart/TinyGPSPlus@^1.1
    jgromes/RadioLib@^7.0
lib_extra_dirs =
    ../shared-protocol
build_flags =
    -DFEATHER_TRACKER
    -DRADIOLIB_SPI_PARANOID=0
upload_protocol = sam-ba
