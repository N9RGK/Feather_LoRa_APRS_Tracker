; Flash diagnostic tool for Feather M0 RFM96
; Run: pio run -d tools/flash_diag -t upload && pio device monitor -b 115200

[env:flash_diag]
platform = atmelsam
board = adafruit_feather_m0
framework = arduino
monitor_speed = 115200
monitor_port = /dev/cu.usbmodem*
lib_deps =
    adafruit/Adafruit SPIFlash@^4.3
    adafruit/SdFat - Adafruit Fork@^2.2
upload_protocol = sam-ba
